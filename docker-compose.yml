services:
  postgres:
    image: postgres:16-alpine
    container_name: xegineer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xegineer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - xegineer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xegineer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xegineer-postgres-data:
